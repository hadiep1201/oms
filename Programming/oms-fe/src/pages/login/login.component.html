<section class="login-page">
      <div class="login-card">
        <h1 class="login-title">Đăng nhập</h1>

        <form class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()">
          <label class="field">
            <span
              class="field-icon"
              nz-icon
              nzType="mail"
              nzTheme="outline"
              aria-hidden="true"
            ></span>
            <input
              type="text"
              formControlName="username"
              placeholder="Tên đăng nhập (Email)"
              autocomplete="username"
            />
          </label>

          <label class="field">
            <span
              class="field-icon"
              nz-icon
              nzType="lock"
              nzTheme="outline"
              aria-hidden="true"
            ></span>
            <input
              type="password"
              formControlName="password"
              placeholder="Mật khẩu"
              autocomplete="current-password"
            />
          </label>

          <a class="forgot-link" href="javascript:void(0)">Quên mật khẩu</a>

          <button type="submit" class="sign-in-btn" [disabled]="form.invalid || loading()">
            {{ loading() ? 'Đang đăng nhập…' : 'Đăng nhập' }}
          </button>
          @if (errorMessage()) {
            <p class="login-error">{{ errorMessage() }}</p>
          }
        </form>
      </div>
    </section>
