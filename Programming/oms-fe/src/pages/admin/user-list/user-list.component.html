<div class="user-list-container">
      <div class="header">
        <h2>Quản lý người dùng</h2>
        <button class="btn btn-primary" routerLink="/admin/users/new">Tạo người dùng mới</button>
      </div>

      <table class="user-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Ảnh đại diện</th>
            <th>Tên</th>
            <th>Email</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let user of users">
            <td>{{ user.userId }}</td>
            <td>
              <img [src]="user.avatarUrl || 'https://via.placeholder.com/40'" class="avatar" alt="Avatar"/>
            </td>
            <td>{{ user.userName }}</td>
            <td>{{ user.email }}</td>
            <td>
              <span class="status-badge" [ngClass]="user.status ? user.status.toLowerCase() : ''">{{ user.status || 'UNKNOWN' }}</span>
            </td>
            <td class="actions">
              <button class="btn btn-sm btn-outline" [routerLink]="['/admin/users/view', user.userId]" style="margin-right: 5px;">Xem</button>
              <button class="btn btn-sm btn-outline" [routerLink]="['/admin/users/edit', user.userId]">Sửa</button>
              <button 
                *ngIf="user.status !== 'DEACTIVATED'" 
                class="btn btn-sm btn-danger" 
                (click)="deactivateUser(user.userId)">
                Vô hiệu hóa
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
